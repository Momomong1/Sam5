<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼국지 5 황금판 - 웹 플레이</title>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; color: white; text-align: center; overflow: hidden; }
        #canvas { width: 100%; height: 100%; border: none; display: block; }
        #loading-text { margin-top: 50px; font-size: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading-text">에뮬레이터 구동 준비 중... 잠시만 기다려주세요.</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        var _originalGetElement = document.getElementById;
        document.getElementById = function(id) {
            var el = _originalGetElement.call(document, id);
            if (el) return el; // 원래 부품이 있으면 통과
            
            // 부품이 없으면 즉석에서 투명 부품(Dummy)을 찍어내서 에러를 막음
            var dummy = document.createElement('div');
            dummy.id = id;
            dummy.style.display = 'none';
            dummy.checked = true; // 체크박스인 척
            dummy.value = "";     // 파일입력창인 척
            document.body.appendChild(dummy);
            return dummy;
        };

        var loadingText = document.getElementById('loading-text');

        var Module = {
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                if (text === "") {
                    loadingText.style.display = 'none'; 
                } else if (text) {
                    loadingText.innerHTML = text;
                }
            },
            locateFile: function(path) {
                if (path.endsWith('.wasm')) return "https://kevodwyer.github.io/boxedwine-examples/" + path;
                return path;
            }
        };

        var BoxedWineConfig = {
            URLToAppZipFile: "sam5.zip", 
            ProgramExecutable: "SAM5GOLD25_KO_1.10.exe", 
            urlToBaseZipFile: "https://kevodwyer.github.io/boxedwine-examples/boxedwine.zip", 
            isAutoRun: true 
        };
    </script>
    
    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine.js"></script>
    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine-shell.js"></script>
</body>
</html>
