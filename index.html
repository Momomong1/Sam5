<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼국지5 황금판 웹 실행 - Cloud Edition</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        #canvas { width: 100%; height: 100%; display: block; }
        #loadingUI { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 999; }
        #hidden-controls { display: none; }
    </style>
</head>
<body>
    <div id="loadingUI">
        <h2>삼국지5 황금판 로딩 중...</h2>
        <p>나만의 클라우드 서버에서 대용량 데이터를 불러오고 있습니다.</p>
        <p>최초 실행 시 시간이 다소 걸릴 수 있습니다.</p>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="hidden-controls">
        <button id="runBtn"></button>
        <button id="fullScreenBtn"></button>
        <button id="extractBtn"></button>
        <input type="checkbox" id="SoundToggle" checked>
        <input type="checkbox" id="soundToggle" checked>
        <input type="file" id="uploadBtn">
        <input type="file" id="file">
        <input type="file" id="openfile">
        <div id="status"></div>
        <div id="output"></div>
        <div id="spinner"></div>
        <progress id="progress" value="0" max="100"></progress>
        <div id="dropzone"></div>
    </div>

    <script>
        var myRunDependencies = 0;

        var Module = {
            canvas: document.getElementById("canvas"),
            noInitialRun: true, // 파일 로딩 전 자동 실행 방지
            
            locateFile: function(path) {
                if (path.endsWith(".wasm") || path.endsWith(".data")) {
                    return "https://kevodwyer.github.io/boxedwine-examples/" + path;
                }
                return path;
            }
        };

        // 삭제된 에뮬레이터 함수 복구 (폴리필)
        Object.defineProperty(Module, 'addRunDependency', {
            value: function(id) { 
                myRunDependencies++; 
                console.log("[시스템] 데이터 수신 중: " + id);
            },
            writable: false, configurable: true
        });

        Object.defineProperty(Module, 'removeRunDependency', {
            value: function(id) { 
                myRunDependencies--; 
                console.log("[시스템] 수신 완료: " + id);
                
                if (myRunDependencies === 0) {
                    var loadingUI = document.getElementById("loadingUI");
                    if(loadingUI) loadingUI.style.display = "none";
                    
                    setTimeout(function() {
                        console.log("[시스템] 삼국지 5 실행!");
                        if (Module.callMain) {
                            Module.callMain(Module.arguments);
                        }
                    }, 500);
                }
            },
            writable: false, configurable: true
        });

        var BoxedWineConfig = {
            // ★ 드디어 성공한 나만의 보안 서버 주소! ★
            urlToAppZipFile: "https://retro-sam5.duckdns.org/sam5.zip",
            
            programExecutable: "SAM5GOLD25_KO_1.10.exe",
            urlToBaseZipFile: "https://kevodwyer.github.io/boxedwine-examples/boxedwine.zip",
            isAutoRun: true
        };
    </script>

    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine.js"></script>
    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine-shell.js"></script>

</body>
</html>
