<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼국지5 황금판 - 정식 서버 구동</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        #canvas { width: 100%; height: 100%; display: block; }
        #loadingUI { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 999; }
        #hidden-controls { display: none; }
    </style>
</head>
<body>
    <div id="loadingUI">
        <h2 id="loadingText">데이터 수신 중...</h2>
        <p>https://retro-sam5.duckdns.org 서버 연결 완료</p>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="hidden-controls">
        <button id="runBtn"></button><button id="fullScreenBtn"></button><button id="extractBtn"></button>
        <input type="checkbox" id="SoundToggle" checked><input type="checkbox" id="soundToggle" checked>
        <input type="file" id="uploadBtn"><input type="file" id="file"><input type="file" id="openfile">
        <div id="status"></div><div id="output"></div><div id="spinner"></div>
        <progress id="progress" value="0" max="100"></progress><div id="dropzone"></div>
    </div>

    <script>
        // 1. [Scenario A 적용] 엔진 로드 전에 Module을 완벽하게 정의합니다.
        var myRunDependencies = 0;
        window.Module = {
            canvas: document.getElementById("canvas"),
            noInitialRun: true,
            
            // 엔진이 찾고 있는 바로 그 함수들을 미리 '선점'해서 정의합니다.
            addRunDependency: function(id) { 
                myRunDependencies++; 
                console.log("[엔진] 종속성 추가: " + id);
            },
            removeRunDependency: function(id) { 
                myRunDependencies--;
                console.log("[엔진] 종속성 제거: " + id);
                if (myRunDependencies === 0) {
                    document.getElementById("loadingUI").style.display = "none";
                    // 모든 파일 로딩 후 메인 실행
                    setTimeout(function() {
                        if (Module.callMain) {
                            Module.callMain(Module.arguments);
                        }
                    }, 500);
                }
            },
            locateFile: function(path) {
                return "https://kevodwyer.github.io/boxedwine-examples/" + path;
            },
            onRuntimeInitialized: function() {
                console.log("[시스템] Wasm 런타임 초기화 완료");
            }
        };

        // 2. 엔진이 설정을 참조할 수 있도록 전역 객체 세팅
        window.BoxedWineConfig = {
            urlToAppZipFile: "https://retro-sam5.duckdns.org/sam5.zip",
            programExecutable: "SAM5GOLD25_KO_1.10.exe",
            urlToBaseZipFile: "https://kevodwyer.github.io/boxedwine-examples/boxedwine.zip",
            isAutoRun: true
        };

        // 3. 엔진 내부 변수인 'Config'가 생성되면 우리 주소를 강제로 주입하는 보조 장치
        var checkInterval = setInterval(function() {
            if (typeof Config !== 'undefined') {
                Config.urlToAppZipFile = window.BoxedWineConfig.urlToAppZipFile;
                Config.programExecutable = window.BoxedWineConfig.programExecutable;
                Config.isAutoRun = true;
                console.log("[성공] 서버 데이터 주소 강제 매핑 완료");
                clearInterval(checkInterval);
            }
        }, 50);
    </script>

    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine.js"></script>
    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine-shell.js"></script>

</body>
</html>
