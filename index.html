<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>삼국지 5 황금판 - 웹 플레이</title>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #000; color: white; text-align: center; overflow: hidden; }
        #canvas { width: 100%; height: 100%; border: none; display: block; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-family: sans-serif; }
        
        /* 스크립트를 속이기 위한 가짜 부품들을 화면에서 완벽하게 숨김 */
        #hidden-controls { display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>에뮬레이터 및 게임 파일 로딩 중...</h2>
        <p>잠시만 기다려주세요 (화면이 멈춘 것 같아도 다운로드 중입니다)</p>
    </div>

    <div id="hidden-controls">
        <button id="runBtn"></button>
        <button id="fullScreenBtn"></button>
        <input type="checkbox" id="SoundToggle" checked>
        <input type="file" id="uploadBtn">
        <input type="file" id="file">
        <input type="file" id="openfile">
        <button id="extractBtn"></button>
        <div id="status"></div>
        <progress id="progress" value="0" max="100"></progress>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            // 미러 서버의 Emscripten 버그 강제 패치
            addRunDependency: function() {},
            removeRunDependency: function() {},
            locateFile: function(path) {
                if (path.endsWith('.wasm')) return "https://kevodwyer.github.io/boxedwine-examples/" + path;
                return path;
            }
        };

        // 대소문자 오류 수정판 (소문자 u, p)
        var BoxedWineConfig = {
            urlToAppZipFile: "sam5.zip", 
            programExecutable: "SAM5GOLD25_KO_1.10.exe", 
            urlToBaseZipFile: "https://kevodwyer.github.io/boxedwine-examples/boxedwine.zip", 
            isAutoRun: true 
        };
    </script>
    
    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine.js"></script>
    <script src="https://kevodwyer.github.io/boxedwine-examples/boxedwine-shell.js"></script>
    
    <script>
        // 게임이 켜질 즈음 안내 문구 숨기기 (약 7초 후)
        setTimeout(function() {
            var ui = document.getElementById("ui");
            if(ui) ui.style.display = "none";
        }, 7000);
    </script>
</body>
</html>
